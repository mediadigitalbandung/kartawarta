<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="popbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111213;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topgreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AA13;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC18;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottomcta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AA13;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008C10;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#00AA13;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00AA13;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="600" height="400" fill="url(#popbg)" rx="16"/>
  <rect width="600" height="400" fill="url(#glow2)" rx="16"/>
  <rect width="600" height="400" fill="none" stroke="rgba(0,170,19,0.3)" stroke-width="2" rx="16"/>

  <!-- Top green band -->
  <rect x="0" y="0" width="600" height="6" fill="url(#topgreen)" rx="2"/>

  <!-- Decorative circles background -->
  <circle cx="520" cy="80" r="120" fill="rgba(0,170,19,0.04)"/>
  <circle cx="520" cy="80" r="80" fill="rgba(0,170,19,0.06)"/>
  <circle cx="80" cy="320" r="100" fill="rgba(0,170,19,0.04)"/>

  <!-- Top section: Logo + Title -->
  <circle cx="300" cy="80" r="44" fill="#00AA13"/>
  <circle cx="300" cy="80" r="44" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <text x="300" y="72" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="white">JURNALIS</text>
  <text x="300" y="88" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="white">HUKUM</text>
  <text x="300" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="9" fill="rgba(255,255,255,0.65)">BANDUNG</text>

  <!-- Main headline -->
  <text x="300" y="158" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="white">Pasang Iklan Anda</text>
  <text x="300" y="190" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#00AA13">di JHB Sekarang</text>

  <!-- Sub text -->
  <text x="300" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.65)">Jangkau ribuan pembaca profesional hukum</text>
  <text x="300" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.65)">di Bandung setiap harinya — mudah, cepat, terukur.</text>

  <!-- Feature pills -->
  <rect x="88" y="258" width="120" height="28" rx="14" fill="rgba(0,170,19,0.15)"/>
  <rect x="88" y="258" width="120" height="28" rx="14" fill="none" stroke="rgba(0,170,19,0.4)" stroke-width="1"/>
  <text x="148" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#00AA13">✓ Hasil Terukur</text>

  <rect x="240" y="258" width="120" height="28" rx="14" fill="rgba(0,170,19,0.15)"/>
  <rect x="240" y="258" width="120" height="28" rx="14" fill="none" stroke="rgba(0,170,19,0.4)" stroke-width="1"/>
  <text x="300" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#00AA13">✓ Harga Fleksibel</text>

  <rect x="392" y="258" width="120" height="28" rx="14" fill="rgba(0,170,19,0.15)"/>
  <rect x="392" y="258" width="120" height="28" rx="14" fill="none" stroke="rgba(0,170,19,0.4)" stroke-width="1"/>
  <text x="452" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#00AA13">✓ Setup Cepat</text>

  <!-- CTA button -->
  <rect x="100" y="308" width="400" height="58" rx="29" fill="url(#bottomcta)"/>
  <rect x="100" y="308" width="400" height="58" rx="29" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="300" y="333" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="white">Hubungi Tim Iklan JHB</text>
  <text x="300" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">jurnalishukumbandung.com/iklan →</text>

  <!-- Bottom note -->
  <text x="300" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Klik × untuk menutup</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="728" height="90" viewBox="0 0 728 90">
  <defs>
    <linearGradient id="footerbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AA13;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#009912;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1C1E;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="728" height="90" fill="url(#footerbg)"/>
  <rect width="728" height="90" fill="url(#dots)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="86" width="728" height="4" fill="rgba(0,0,0,0.2)"/>

  <!-- Logo -->
  <circle cx="50" cy="45" r="26" fill="rgba(255,255,255,0.15)"/>
  <circle cx="50" cy="45" r="26" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="50" y="40" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="10" fill="white">JHB</text>
  <text x="50" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="rgba(255,255,255,0.75)">BANDUNG</text>

  <!-- Divider line -->
  <line x1="90" y1="18" x2="90" y2="72" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Headline -->
  <text x="108" y="32" font-family="Arial Black, Arial" font-weight="900" font-size="17" fill="white">Jadikan Bisnis Hukum Anda Lebih Dikenal</text>
  <text x="108" y="52" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">Pasang iklan di media hukum dengan pembaca paling aktif di Bandung</text>

  <!-- Small checklist -->
  <text x="108" y="70" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">✓ Jangkauan luas</text>
  <text x="200" y="70" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">✓ Harga terjangkau</text>
  <text x="308" y="70" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">✓ Laporan statistik lengkap</text>

  <!-- CTA -->
  <rect x="558" y="20" width="155" height="50" rx="25" fill="white"/>
  <text x="635" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#00AA13">Pasang Iklan</text>
  <text x="635" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#1C1C1E">Mulai Hari Ini →</text>
</svg>
